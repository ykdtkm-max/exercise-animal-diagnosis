<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16タイプ × 動物キャラ提案</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --black:    #0D0D0D;
    --gray-900: #111827;
    --gray-800: #1F2937;
    --gray-700: #374151;
    --gray-600: #4B5563;
    --gray-500: #6B7280;
    --gray-400: #9CA3AF;
    --gray-300: #D1D5DB;
    --gray-200: #E5E7EB;
    --gray-100: #F3F4F6;
    --gray-50:  #F9FAFB;
    --white:    #FFFFFF;
    --text:     #0D0D0D;
    --text-sub: #6B7280;
    --border:   #E5E7EB;
    --bg:       #F9FAFB;
    --r-sm:  8px;
    --r-md:  14px;
    --r-lg:  18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-snap-type: y mandatory;
    overflow-y: scroll;
    height: 100%;
  }

  body {
    font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont,
                 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  /* ── スライド ── */
  .slide {
    min-height: 100vh;
    scroll-snap-align: start;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 48px 72px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
  }

  /* ── ヘッダー ── */
  .slide-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .code {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    font-weight: 700;
    background: var(--black);
    color: var(--white);
    padding: 4px 10px;
    border-radius: var(--r-sm);
    letter-spacing: 1.5px;
    flex-shrink: 0;
  }

  .group-tag {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    flex-shrink: 0;
  }

  .type-name {
    font-size: 24px;
    font-weight: 800;
    color: var(--black);
    letter-spacing: -0.03em;
    flex-shrink: 0;
  }

  .tagline {
    font-size: 12px;
    color: var(--text-sub);
    margin-left: auto;
    white-space: nowrap;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  /* ── カードグリッド ── */
  .candidates {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  /* ── 候補カード（全48枚・固定寸法） ── */
  .candidate {
    height: 448px;
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 22px 22px 18px;
    display: flex;
    flex-direction: column;
    background: var(--white);
    overflow: hidden;
    transition: box-shadow 0.18s ease, transform 0.18s ease;
  }

  .candidate:hover {
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    transform: translateY(-2px);
  }

  /* ラベル */
  .candidate-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--gray-400);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  /* 動物名 */
  .animal-name {
    font-size: 20px;
    font-weight: 800;
    color: var(--black);
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 3px;
  }

  .animal-sub {
    font-size: 11px;
    color: var(--gray-400);
    font-weight: 400;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }

  /* 区切り線 */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  /* 選定理由 */
  .reason {
    font-size: 11.5px;
    line-height: 1.85;
    color: var(--gray-700);
    margin-bottom: 10px;
    flex: 1;
    overflow: hidden;
  }

  /* 一致ポイント */
  .points {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  .point-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.2px;
  }

  /* キャラ名 */
  .char-names {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }

  .char-name {
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    background: var(--gray-50);
    border-radius: var(--r-sm);
    color: var(--gray-800);
    border-left: 3px solid transparent;
    letter-spacing: -0.01em;
  }

  /* ── ナビゲーション ── */
  .nav {
    position: fixed;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 5px;
    z-index: 200;
  }

  .nav-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gray-300);
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
  }

  .nav-dot:hover::after {
    content: attr(data-label);
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--black);
    color: var(--white);
    font-size: 10px;
    white-space: nowrap;
    padding: 3px 8px;
    border-radius: var(--r-sm);
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    pointer-events: none;
  }

  .nav-dot.active {
    background: var(--black);
    height: 20px;
    border-radius: 3px;
  }

  .counter {
    position: fixed;
    top: 20px;
    right: 40px;
    font-size: 11px;
    color: var(--gray-400);
    font-family: 'Courier New', monospace;
    z-index: 200;
    letter-spacing: 1.5px;
  }

  .hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--gray-300);
    z-index: 200;
    letter-spacing: 0.3px;
  }

  /* ── グループカラー ── */
  /* SF: Amber */
  .sf .group-tag { background: #FEF3C7; color: #B45309; }
  .sf .candidate { border-top: 3px solid #F59E0B; }
  .sf .char-name { border-left-color: #F59E0B; }
  .sf .point-tag { background: #FFFBEB; color: #92400E; }

  /* SP: Blue */
  .sp .group-tag { background: #DBEAFE; color: #1D4ED8; }
  .sp .candidate { border-top: 3px solid #3B82F6; }
  .sp .char-name { border-left-color: #3B82F6; }
  .sp .point-tag { background: #EFF6FF; color: #1E40AF; }

  /* GF: Red */
  .gf .group-tag { background: #FEE2E2; color: #B91C1C; }
  .gf .candidate { border-top: 3px solid #EF4444; }
  .gf .char-name { border-left-color: #EF4444; }
  .gf .point-tag { background: #FFF1F2; color: #9F1239; }

  /* GP: Green */
  .gp .group-tag { background: #DCFCE7; color: #15803D; }
  .gp .candidate { border-top: 3px solid #22C55E; }
  .gp .char-name { border-left-color: #22C55E; }
  .gp .point-tag { background: #F0FDF4; color: #166534; }
</style>
</head>
<body>

<div class="nav" id="nav"></div>
<div class="counter" id="counter">01 / 16</div>
<div class="hint">↑ ↓ キーまたはスクロールでタイプを切り替え</div>
<div id="app"></div>

        chars: ['義理の番犬', '帰ってくる犬', '忠犬の誓い']
      },
      {

        reason: 'ミーアキャットのセンティネル（見張り番）は採食中のコロニーを守るために自分の採食時間を犠牲にして高い岩の上に立ち続ける。センティネルは交代制で、自分の番が来ると次の個体に引き継ぐまで持ち場を離れない。「仲間のためなら誰より長く続けられる」このタイプの責任感と完全に重なる。',

/* ── スライド生成 ── */
const app   = document.getElementById('app');
const navEl = document.getElementById('nav');
const ctrEl = document.getElementById('counter');

types.forEach((t, i) => {
  const slide = document.createElement('section');
  slide.className = `slide ${t.group}`;
  slide.id = `slide-${i}`;

  const cardsHTML = t.candidates.map(c => `
    <div class="candidate">
      <div class="candidate-label">Candidate ${c.label}</div>
      <div class="animal-name">${c.animal}</div>
      <div class="animal-sub">${c.sub}</div>
      <hr class="divider">
      <p class="reason">${c.reason}</p>
      <div class="points">
        ${c.points.map(p => `<span class="point-tag">${p}</span>`).join('')}
      </div>
      <div class="char-names">
        ${c.chars.map(n => `<span class="char-name">${n}</span>`).join('')}
      </div>
    </div>
  `).join('');

  slide.innerHTML = `
    <div class="slide-header">
      <span class="code">${t.code}</span>
      <span class="group-tag">${t.groupLabel}</span>
      <h2 class="type-name">${t.name}</h2>
      <span class="tagline">${t.tagline}</span>
    </div>
    <div class="candidates">${cardsHTML}</div>
  `;
  app.appendChild(slide);

  const dot = document.createElement('div');
  dot.className = 'nav-dot';
  dot.dataset.label = `${t.code} ${t.name}`;
  dot.addEventListener('click', () => slide.scrollIntoView({ behavior: 'smooth' }));
  navEl.appendChild(dot);
});

/* ── アクティブ状態 ── */
const slides = document.querySelectorAll('.slide');
const dots   = document.querySelectorAll('.nav-dot');
let current  = 0;

const obs = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const idx = [...slides].indexOf(entry.target);
      current = idx;
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
      ctrEl.textContent = `${String(idx + 1).padStart(2, '0')} / 16`;
    }
  });
}, { threshold: 0.5 });

slides.forEach(s => obs.observe(s));

/* ── キーボード操作 ── */
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    current = Math.min(current + 1, slides.length - 1);
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    current = Math.max(current - 1, 0);
  } else { return; }
  slides[current].scrollIntoView({ behavior: 'smooth' });
});
</script>
